      // Sandboxed browser code execution helper
      const executeUserCodeInBrowser = (code, challengeId, expectedKeywords) => {
        let loggedOutputs = [];
        let executionError = null;

        // Create console mock
        const sandboxConsole = {
          log: (...args) => {
            loggedOutputs.push(args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(" "));
          },
          error: (...args) => { clickedOutputs.push("[ERRO] " + args.join(" ")); },
          warn: (...args) => { clickedOutputs.push("[AVISO] " + args.join(" ")); }
        };

        try {
          // Evaluation environment
          const sandbox = new Function("console", `
            try {
              ${code}
            } catch (err) {
              throw err;
            }
          `);
          sandbox(sandboxConsole);
        } catch (err) {
          executionError = err.message;
        }

        const combinedOutput = loggedOutputs.join("\n");
        const lowerOutput = combinedOutput.toLowerCase();
        const normalizedCode = code.replace(/\s+/g, " ");

        // Local requirements checks
        let success = false;
        
        // Match exact challenge verification rules
        if (challengeId === "initial_mission") {
          success = lowerOutput.includes("hello world");
        } else if (challengeId === "var_decl") {
          const hasVars = code.includes("let") && code.includes("const");
          const hasNames = code.includes("nome_aprendiz") && code.includes("pontuacao");
          success = hasVars && hasNames && !executionError;
        } else if (challengeId === "func_decl") {
          const hasFunc = code.includes("function") && code.includes("calcularDobro");
          const hasReturn = code.includes("return");
          // Evaluate return if possible by injecting a call
          let works = false;
          try {
            const evalCheck = new Function(`${code}\nreturn calcularDobro(5);`);
            works = evalCheck() === 10;
          } catch(e){}
          success = hasFunc && hasReturn && works;
        } else if (challengeId === "loops") {
          const countMatch = lowerOutput.includes("1") && lowerOutput.includes("2") && lowerOutput.includes("3");
          success = code.includes("for") && countMatch;
        } else if (challengeId === "dom_select") {
          success = code.includes("document.querySelector") && code.includes(".botao-avancar") && code.includes("addEventListener");
        } else if (challengeId === "fetch_api") {
          success = code.includes("async") && code.includes("fetch") && code.includes("await") && code.includes("return");
        } else {
          success = !executionError;
        }

        // Additional match criteria
        if (expectedKeywords && expectedKeywords.length > 0) {
          const missing = expectedKeywords.filter(k => !code.includes(k));
          if (missing.length > 0) success = false;
        }

        return {
          success,
          output: combinedOutput || "Código executado de forma silenciosa (sem logs de console).",
          error: executionError
        };
      };

                        onClick={() => {
                          const val = prompt("O que deseja postar?");
                          if (val) handleAddForumPost(val);
                        }}
                        className="bg-yellow-400 hover:bg-yellow-350 text-zinc-950 font-black text-xs px-4 py-3 rounded-xl uppercase tracking-wider shrink-0"
                      >
                        Criar Post
                      </button>
                    </div>

                    <div className="space-y-4">
                      {posts.map(p => (
                        <div key={p.id} className="bg-zinc-900 border border-zinc-805 p-5 rounded-[2rem] space-y-3.5 shadow-md">
                          <div className="flex items-center justify-between">
                            <div className="flex items-center gap-2.5">
                              <div className={`w-8 h-8 rounded-full ${p.avatarColor || "bg-zinc-800"} flex items-center justify-center font-bold text-zinc-950 text-xs`}>
                                {p.author[0].toUpperCase()}
                              </div>
                              <div>
                                <div className="flex items-center gap-1.5">
                                  <span className="text-xs font-bold text-zinc-200">{p.author}</span>
                                  {p.userTitle && <span className="bg-zinc-950 text-yellow-400 font-mono text-[9px] px-2 py-0.5 rounded border border-zinc-850">{p.userTitle}</span>}
                                </div>
                                <span className="text-[10px] text-zinc-550 block font-mono mt-0.5">{p.createdAt}</span>
                              </div>
                            </div>
                          </div>

                          <p className="text-xs text-zinc-300 leading-relaxed font-normal">{p.content}</p>

                          {p.codeSnippet && (
                            <pre className="bg-zinc-950 text-yellow-405 border border-zinc-850 p-3 rounded-xl font-mono text-[11px] overflow-x-auto block">
                              <code>{p.codeSnippet}</code>
                            </pre>
                          )}

                          <div className="flex items-center gap-4 pt-2.5 border-t border-zinc-850/80">
                            <button
                              onClick={() => handleLikePost(p.id)}
                              className={`flex items-center gap-1.5 text-xs ${p.hasLiked ? "text-rose-450 font-bold":"text-zinc-450"}`}
                            >
                              <Icon name="Heart" className={`w-4 h-4 ${p.hasLiked ? "text-rose-450 fill-rose-500/20":"text-zinc-450"}`} />
                              {p.likes} Curtidas
                            </button>

                            <button
                              onClick={() => {
                                const c = prompt("Adicione seu comentário:");
                                if (c) handleAddPostComment(p.id, c);
                              }}
                              className="text-zinc-450 hover:text-zinc-200 flex items-center gap-1.5 text-xs"
                            >
                              <Icon name="MessageSquare" className="w-4 h-4 text-zinc-450" /> Responder...
                            </button>
                          </div>

                          {/* Comments box */}
                          {p.comments.length > 0 && (
                            <div className="bg-zinc-950/60 p-3.5 rounded-2xl space-y-3.5 border border-zinc-850/50">
                              {p.comments.map(c => (
                                <div key={c.id} className="text-xs flex gap-2">
                                  <div className={`w-5 h-5 rounded-full ${c.avatarColor} shrink-0 text-zinc-950 flex items-center justify-center font-bold text-[9px]`}>
                                    {c.author[0].toUpperCase()}
                                  </div>
                                  <div className="flex-1">
                                    <div className="flex items-center gap-2">
                                      <span className="font-bold text-zinc-300">{c.author}</span>
                                      <span className="text-[9px] text-[#637280]">{c.createdAt}</span>
                                    </div>
                                    <p className="text-zinc-400 mt-0.5 leading-relaxed">{c.content}</p>
                                  </div>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>
                )}

                {/* 4. STATISTICS AND ACHIEVEMENT BADGES */}
                {activeTab === "profile" && (
                  <div className="space-y-6">
                    {/* Metrics row */}
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                      <div className="bg-zinc-900 border border-zinc-800 p-5 rounded-[2rem] flex flex-col items-center justify-center text-center shadow">
                        <div className="w-11 h-11 border-2 border-yellow-400 shadow shadow-yellow-500/10 text-yellow-400 rounded-full font-black text-sm flex items-center justify-center mb-1.5">
                          {stats.level}
                        </div>
                        <span className="text-[10px] text-zinc-500 font-mono uppercase">Nível Atual</span>
                        <span className="text-xs font-bold text-zinc-350 block mt-0.5">{stats.xp} Total XP</span>
                      </div>

                      <div className="bg-zinc-900 border border-zinc-800 p-5 rounded-[2rem] flex flex-col items-center justify-center text-center shadow">
                        <div className="w-11 h-11 bg-orange-950/20 border border-orange-500/20 text-orange-500 rounded-full flex items-center justify-center mb-1.5">
                          <Icon name="Flame" className="w-5 h-5" />
                        </div>
                        <span className="text-[10px] text-zinc-500 font-mono uppercase">Ofensiva</span>
                        <span className="text-xs font-extrabold text-orange-400 block mt-0.5">{stats.streak} Dias seguidos</span>
                      </div>

                      <div className="bg-zinc-900 border border-zinc-800 p-5 rounded-[2rem] flex flex-col items-center justify-center text-center shadow">
                        <div className="w-11 h-11 bg-yellow-400/5 border border-yellow-400/20 text-yellow-400 rounded-full flex items-center justify-center mb-1.5">
                          <Icon name="Target" className="w-5 h-5" />
                        </div>
                        <div className="flex items-center gap-1">
                          <span className="text-[10px] text-zinc-500 font-mono uppercase">Foco Hoje</span>
                          <button onClick={() => setShowGoalModal(prev => !prev)} className="text-zinc-500 hover:text-yellow-400"><Icon name="Settings" className="w-3 h-3" /></button>
                        </div>
                        <span className="text-xs font-bold text-zinc-350 block mt-0.5">{stats.studyTimeToday} / {stats.dailyGoal} min</span>
                      </div>

                      <div className="bg-zinc-900 border border-zinc-800 p-5 rounded-[2rem] flex flex-col items-center justify-center text-center shadow">
                        <button
                          onClick={handleSimulateStudyMins}
                          className="w-11 h-11 bg-purple-950/20 border border-purple-500/20 text-purple-400 rounded-full flex items-center justify-center mb-1.5 hover:border-yellow-400 transition-colors"
                        >
                          ⚡
                        </button>
                        <span className="text-[10px] text-zinc-500 font-mono uppercase">Simular Estudo</span>
                        <span className="text-xs font-mono text-purple-400 block mt-0.5">Adicionar +5m</span>
                      </div>
                    </div>

                    {/* Adjust study goal modal inline drawer */}
                    {showGoalModal && (
                      <div className="bg-zinc-900 border border-zinc-800 p-5 rounded-3xl space-y-3 shadow-lg">
                        <span className="text-[10px] text-zinc-400 font-mono uppercase">Selecione o tempo da sua meta diária:</span>
                        <div className="flex gap-2">
                          {[5, 10, 15, 30].map(m => (
                            <button
                              key={m}
                              onClick={() => handleSetGoalValue(m)}
                              className={`flex-1 text-xs py-2 rounded-xl font-bold border transition-all ${
                                stats.dailyGoal === m ? "bg-yellow-400 text-zinc-950 border-yellow-400 shadow-md shadow-yellow-500/15":"bg-zinc-950 hover:bg-zinc-850 border-zinc-850 text-zinc-400"
                              }`}
                            >
                              {m} min
                            </button>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Badges and ranking section */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                      <div className="md:col-span-2 bg-zinc-900 border border-zinc-800 p-6 rounded-[2rem] shadow-lg relative overflow-hidden">
                        <div className="absolute right-0 top-0 w-32 h-32 bg-yellow-400/5 blur-xl rounded-full" />
                        <h4 className="text-xs font-black uppercase tracking-wider text-zinc-400 block mb-5">Medalhas e Conquistas ({achievements.filter(a => a.unlocked).length}/{achievements.length})</h4>
                        
                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
                          {achievements.map(ach => (
                            <div
                              key={ach.id}
                              className={`border p-3 rounded-2xl flex flex-col items-center justify-center text-center relative ${
                                ach.unlocked ? "bg-zinc-950 border-zinc-800 shadow":"bg-zinc-950/10 border-zinc-950/20 opacity-40 select-none pb-3"
                              }`}
                            >
                              <span className={`text-[7px] font-mono font-bold px-1.5 py-0.5 rounded absolute top-2 right-2 uppercase ${
                                ach.rarity === "Lendário" ? "bg-yellow-950/30 text-yellow-500 border border-yellow-800/10":
                                ach.rarity === "Épico" ? "bg-purple-950/30 text-purple-400 border border-purple-800/10":
                                ach.rarity === "Raro" ? "bg-blue-950/30 text-blue-400 border border-blue-800/10":"bg-zinc-900 text-zinc-400 border border-zinc-800"
                              }`}>{ach.rarity}</span>

                              <div className={`w-9 h-9 rounded-full flex items-center justify-center mb-1.5 mt-2.5 ${ach.unlocked ? "bg-zinc-90 w bg-zinc-900 text-yellow-400 shadow":"bg-zinc-900 text-zinc-650"}`}>
                                <Icon name={ach.iconName} className="w-5 h-5" />
                              </div>

                              <h5 className="text-[11px] font-bold text-zinc-200 truncate max-w-[100px]">{ach.title}</h5>
                              <p className="text-[9px] text-zinc-400 font-medium leading-tight mt-0.5 truncate max-w-[110px]">{ach.description}</p>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* Rank container column */}
                      <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-[2rem] shadow-lg">
                        <span className="text-[10px] text-zinc-400 font-mono uppercase block mb-4">Ranking de Aprendizes (Liga Crayon)</span>
                        
                        <div className="space-y-2.5">
                          {leaderboard.map((u, i) => {
                            const position = i + 1;
                            return (
                              <div
                                key={u.id}
                                className={`p-3 rounded-xl flex items-center justify-between border ${
                                  u.isCurrentUser ? "bg-zinc-950 border-yellow-400 shadow-md shadow-yellow-500/10":"bg-zinc-950/40 border-zinc-900/60"
                                }`}
                              >
                                <div className="flex items-center gap-2.5">
                                  <span className={`text-[10px] font-mono font-black ${position===1 ? "text-yellow-400": position===2 ? "text-zinc-400":"text-zinc-600"}`}>#{position}</span>
                                  <span className="text-sm">{u.avatar}</span>
                                  <div className="max-w-[100px] truncate">
                                    <span className="text-xs font-bold text-zinc-200 block truncate">{u.name}</span>
                                    <span className="text-[9px] text-zinc-550">Nvl {u.level}</span>
                                  </div>
                                </div>
                                <span className="text-xs font-mono font-black text-zinc-300">{u.xp} XP</span>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    </div>
                  </div>
                )}
              </section>
            </main>

            {/* persists Footer */}
            <footer className="bg-zinc-950 border-t border-zinc-900 py-6 text-center text-zinc-600 text-xs">
              <p>© 2026 Plataforma de Aprendizagem de JavaScript. Todos os dados permanecem salvos localmente.</p>
            </footer>
          </div>
        );
      }

      // Safe render compiler bootstrapping
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
