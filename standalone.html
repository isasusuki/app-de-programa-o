        // Execute JS sandbox client-side securely
        const handleRunSandbox = () => {
          let stdout = [];
          const fakeConsole = {
            log: (...args) => {
              stdout.push(args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(" "));
            }
          };

          try {
            const sandbox = new Function("console", `
              try {
                ${userCode}
              } catch (e) {
                throw e;
              }
            `);
            sandbox(fakeConsole);
            setConsoleOutput(stdout.join("\n") || "Código executado sem saídas de console.");
          } catch (e) {
            setConsoleOutput(`🔴 [Erro]: ${e.message}`);
          }
        };

        // Validate submission and earn rewards
        const handleEvaluateCode = () => {
          let stdout = [];
          const fakeConsole = {
            log: (...args) => stdout.push(args.map(arg => String(arg)).join(" "))
          };

          let runtimeError = null;
          try {
            const sandbox = new Function("console", userCode);
            sandbox(fakeConsole);
          } catch (e) {
            runtimeError = e.message;
          }

          const challenge = selectedModule.challenges[0];
          const hasKeywords = challenge.expectedKeywords.every(k => userCode.includes(k));
          
          let validated = !runtimeError && hasKeywords;
          if (challenge.id === "initial_mission") {
            validated = validated && stdout.join(" ").toLowerCase().includes("hello world");
          }

          const report = getCoachFeedback(challenge.id, userCode, validated, runtimeError);
          setEvaluation(report);

          if (validated) {
            showToast("✨ Excelente! Desafio validado (+50 XP)");
            
            // Mark module and challenge complete
            const nextModules = modules.map(m => {
              if (m.id === selectedModule.id) {
                return {
                  ...m,
                  completed: true,
                  challenges: m.challenges.map(c => c.id === challenge.id ? { ...c, isCompleted: true } : c)
                };
              }
              return m;
            });

            // Unlock next module logically
            let targetUnlockIdx = -1;
            const currentIdx = modules.findIndex(m => m.id === selectedModule.id);
            if (currentIdx !== -1 && currentIdx < modules.length - 1) {
              targetUnlockIdx = currentIdx + 1;
            }

            const finalModules = nextModules.map((m, i) => i === targetUnlockIdx ? { ...m, unlocked: true } : m);

            // Earn XP
            const calculatedXp = stats.xp + 50;
            const updatedLevel = Math.floor(calculatedXp / 100);
            const nextStats = {
              ...stats,
              xp: calculatedXp,
              level: updatedLevel > stats.level ? updatedLevel : stats.level
            };

            // Unlock award badges
            const currentAwardBadge = achievements.map(ach => {
              if (challenge.id === "initial_mission" && ach.id === "hello_world") return { ...ach, unlocked: true };
              if (challenge.id === "var_decl" && ach.id === "var_master") return { ...ach, unlocked: true };
              if (challenge.id === "func_decl" && ach.id === "func_wizard") return { ...ach, unlocked: true };
              if (challenge.id === "loops" && ach.id === "loop_king") return { ...ach, unlocked: true };
              if (challenge.id === "dom_select" && ach.id === "dom_hacker") return { ...ach, unlocked: true };
              if (challenge.id === "fetch_api" && ach.id === "api_wizard") return { ...ach, unlocked: true };
              return ach;
            });

            // Update rankings
            const nextRank = rankings.map(r => {
              if (r.isCurrentUser) return { ...r, xp: calculatedXp, level: nextStats.level };
              return r;
            }).sort((a, b) => b.xp - a.xp);

            triggerSave(nextStats, finalModules, currentAwardBadge, nextRank, forumPosts);
            setSelectedModule(finalModules[currentIdx]);
          }

                          name="description"
                          className="w-full bg-zinc-950 border border-zinc-850 rounded-xl p-3 text-xs text-zinc-300 focus:outline-none min-h-[100px]"
                          placeholder="Compartilhe uma dica de desenvolvimento ou faça perguntas..."
                          required
                        />
                      </div>
                      <button type="submit" className="w-full bg-yellow-400 text-zinc-950 py-3 rounded-2xl text-xs font-bold uppercase tracking-wider cursor-pointer">
                        Publicar Tópico &rarr;
                      </button>
                    </form>
                  </div>

                  {/* Right Column: Dynamic feed list */}
                  <div className="lg:col-span-2 space-y-6">
                    {forumPosts.map((post) => (
                      <div key={post.id} className="bg-zinc-900 border border-zinc-800 p-6 rounded-[2rem] space-y-4">
                        <div className="flex items-center justify-between">
                          <div className="flex items-center gap-3">
                            <div className="w-9 h-9 rounded-full bg-zinc-850 border border-zinc-750 flex items-center justify-center font-bold text-xs text-white">
                              {post.author[0]}
                            </div>
                            <div>
                              <span className="text-xs font-bold text-white block">{post.author}</span>
                              <span className="text-[10px] text-yellow-500 font-mono uppercase tracking-widest block">{post.userTitle}</span>
                            </div>
                          </div>
                          <span className="text-[10px] text-zinc-500 font-mono">{post.createdAt}</span>
                        </div>

                        <p className="text-xs text-zinc-350 leading-relaxed font-semibold">{post.content}</p>

                        <div className="flex items-center gap-3 border-t border-zinc-850 pt-4 mt-2">
                          <button className="flex items-center gap-1.5 text-[10px] text-zinc-400 hover:text-white font-mono uppercase">
                            <Icon name="Heart" className="w-3.5 h-3.5 text-zinc-500" />
                            {post.likes} Curtidas
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {activeTab === "profile" && (
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                  {/* Stats & achievements */}
                  <div className="md:col-span-2 space-y-6">
                    <div className="bg-zinc-900 border border-zinc-800 p-6 md:p-8 rounded-[2rem] relative overflow-hidden">
                      <div className="absolute -right-20 -top-20 w-80 h-80 bg-yellow-400/5 blur-[100px] rounded-full" />
                      <h3 className="text-sm font-black text-white tracking-wider mb-6 uppercase">Minhas Medalhas Conquistadas</h3>

                      <div className="grid grid-cols-2 sm:grid-cols-3 gap-4">
                        {achievements.map((ach) => (
                          <div
                            key={ach.id}
                            className={`border p-4 rounded-2xl flex flex-col items-center justify-center text-center relative ${
                              ach.unlocked ? "bg-zinc-950/60 border-zinc-800" : "bg-zinc-950/20 border-zinc-900 opacity-40"
                            }`}
                          >
                            <span className="text-[8px] font-mono font-bold tracking-widest px-2 py-0.5 rounded-full absolute top-2 right-2 uppercase bg-zinc-900 text-zinc-400">
                              {ach.rarity}
                            </span>
                            <div className="w-12 h-12 rounded-full bg-zinc-900 text-yellow-400 flex items-center justify-center mb-2 mt-4">
                              <Icon name={ach.iconName} className="w-6 h-6" />
                            </div>
                            <h4 className="text-xs font-bold text-zinc-200 truncate max-w-[130px]">{ach.title}</h4>
                            <p className="text-[10px] text-zinc-500 leading-snug mt-1 max-w-[120px]">{ach.description}</p>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>

                  {/* Weekly Rankings */}
                  <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-[2rem] space-y-4">
                    <div className="flex items-center gap-2 mb-4">
                      <Icon name="Trophy" className="w-5 h-5 text-yellow-400 shrink-0" />
                      <h3 className="text-sm font-black text-white tracking-wider uppercase">Ranking Semanal</h3>
                    </div>

                    <div className="space-y-3">
                      {rankings.map((user, idx) => (
                        <div key={user.id} className={`p-3 rounded-2xl flex items-center justify-between border ${user.isCurrentUser ? "bg-zinc-950 border-yellow-400 shadow-md shadow-yellow-400/10" : "bg-zinc-950/40 border-zinc-900"}`}>
                          <div className="flex items-center gap-3">
                            <span className="text-xs font-mono font-bold text-zinc-400">#{idx + 1}</span>
                            <span className="text-lg">{user.avatar}</span>
                            <div>
                              <span className="text-xs font-bold text-zinc-200 block">{user.name}</span>
                              <span className="text-[9px] text-zinc-500 font-mono">Nível {user.level}</span>
                            </div>
                          </div>
                          <span className="text-xs font-mono font-bold text-zinc-400">{user.xp} XP</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}
            </main>

            {/* Simulated active dynamic modal triggers */}
            {showGoalModal && (
              <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
                <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-[2rem] max-w-sm w-full space-y-4 relative">
                  <h4 className="text-sm font-black text-white uppercase tracking-wider">Ajustar Meta Diária de estudos</h4>
                  <p className="text-xs text-zinc-400">Marque por quantos minutos diários você pretende focar no aprendizado guiado de JavaScript:</p>
                  
                  <div className="grid grid-cols-2 gap-2">
                    {[5, 10, 15, 30].map(mins => (
                      <button
                        key={mins}
                        onClick={() => handleSetGoalValue(mins)}
                        className={`py-3 rounded-xl block font-bold text-xs uppercase cursor-pointer ${stats.dailyGoal === mins ? "bg-yellow-400 text-zinc-950" : "bg-zinc-950 hover:bg-zinc-800 text-zinc-400"}`}
                      >
                        {mins} minutos
                      </button>
                    ))}
                  </div>

                  <button onClick={() => setShowGoalModal(false)} className="w-full py-2.5 bg-zinc-950 border border-zinc-800 rounded-xl text-xs text-zinc-500 font-bold block">
                    Fechar Janela
                  </button>
                </div>
              </div>
            )}

            {/* First-use onboarding interactive card */}
            {!stats.tutorialCompleted && (
              <div className="fixed inset-0 bg-black/85 backdrop-blur-md z-50 flex items-center justify-center p-4">
                <div className="bg-zinc-900 border border-zinc-800 max-w-md w-full rounded-[2.2rem] p-8 relative space-y-6">
                  <div className="absolute -right-8 -top-8 w-24 h-24 bg-yellow-400/5 blur-3xl rounded-full" />
                  
                  <div className="flex flex-col items-center text-center space-y-4">
                    <div className="w-16 h-16 rounded-full bg-zinc-950 border border-zinc-800 shadow-inner flex items-center justify-center text-yellow-400">
                      <Icon name="Star" className="w-8 h-8 animate-pulse" />
                    </div>
                    <h3 className="text-lg font-black text-white tracking-tight">{tutorialSteps[activeTutorialStep].title}</h3>
                    <p className="text-xs text-zinc-400 leading-relaxed font-semibold">{tutorialSteps[activeTutorialStep].desc}</p>
                  </div>

                  <div className="bg-zinc-950 p-4 border border-zinc-850 rounded-2xl">
                    <span className="text-[10px] text-zinc-500 font-mono tracking-wider uppercase block mb-1 font-bold">Dica Útil</span>
                    <p className="text-xs text-yellow-400 font-medium">💡 {tutorialSteps[activeTutorialStep].highlight}</p>
                  </div>

                  <div className="flex items-center justify-between gap-4">
                    <button onClick={() => triggerSave({ ...stats, tutorialCompleted: true }, modules, achievements, rankings, forumPosts)} className="text-xs text-zinc-500 hover:text-white uppercase font-bold tracking-wider">
                      Pular Tutorial
                    </button>
                    
                    {activeTutorialStep < tutorialSteps.length - 1 ? (
                      <button onClick={() => setActiveTutorialStep(prev => prev + 1)} className="bg-zinc-100 hover:bg-zinc-200 text-zinc-900 px-5 py-3 rounded-2xl font-black text-xs uppercase tracking-wider">
                        Avançar &rarr;
                      </button>
                    ) : (
                      <button onClick={() => triggerSave({ ...stats, tutorialCompleted: true }, modules, achievements, rankings, forumPosts)} className="bg-yellow-400 hover:bg-yellow-350 text-zinc-950 px-5 py-3 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-yellow-400/10">
                        Entrar na Trilha!
                      </button>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* Custom generic popup notifications and toast */}
            {toastMessage && (
              <div className="fixed bottom-6 right-6 z-50 bg-yellow-400 text-zinc-950 py-3.5 px-6 rounded-2xl text-xs font-black uppercase tracking-wider shadow-xl shadow-yellow-400/10 animate-float">
                {toastMessage}
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
